<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário de Tickets & Reservas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #2c2c2a; font-size: 14px; }
  header { background: #fff; border-bottom: 1px solid #e0dfd8; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; flex-wrap: wrap; gap: 8px; }
  header h1 { font-size: 17px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .last-update { font-size: 12px; color: #888780; background: #f1efe8; padding: 3px 10px; border-radius: 20px; }
  .btn { border: none; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
  .btn-dark { background: #2c2c2a; color: #fff; }
  .btn-dark:hover { background: #444441; }
  .btn-dark:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-outline { background: #fff; color: #2c2c2a; border: 1px solid #d3d1c7; }
  .btn-outline:hover { background: #f1efe8; }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

  /* KPIs */
  .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  .kpi { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #e0dfd8; }
  .kpi .label { font-size: 11px; color: #888780; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .kpi .value { font-size: 24px; font-weight: 700; }
  .kpi.urgent .value  { color: #c0392b; }
  .kpi.warning .value { color: #d4880a; }
  .kpi.ok .value      { color: #1e7e4e; }
  .kpi.done .value    { color: #185fa5; }
  .kpi.total .value   { color: #2c2c2a; }

  /* Filtros */
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .nav-month { display: flex; align-items: center; gap: 10px; }
  .month-title { font-size: 18px; font-weight: 600; min-width: 200px; text-align: center; }
  .filters-right { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filters-right select { border: 1px solid #d3d1c7; border-radius: 8px; padding: 5px 10px; font-size: 13px; background: #fff; }
  .btn-group { display: flex; gap: 4px; }
  .btn-filter { border: 1px solid #d3d1c7; background: #fff; border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: #5f5e5a; }
  .btn-filter.active { background: #2c2c2a; color: #fff; border-color: #2c2c2a; }

  /* Calendário */
  .calendar-wrap { background: #fff; border-radius: 12px; border: 1px solid #e0dfd8; overflow: hidden; }
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid #e0dfd8; }
  .cal-dow { text-align: center; padding: 10px; font-size: 12px; font-weight: 600; color: #888780; text-transform: uppercase; letter-spacing: 0.04em; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-day { border-right: 1px solid #f1efe8; border-bottom: 1px solid #f1efe8; min-height: 110px; padding: 6px; position: relative; }
  .cal-day:nth-child(7n) { border-right: none; }
  .cal-day.other-month { background: #faf9f6; }
  .cal-day.today { background: #f0f7ff; }
  .cal-day-num { font-size: 12px; font-weight: 600; color: #888780; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
  .cal-day.today .cal-day-num { color: #185fa5; }
  .today-dot { width: 6px; height: 6px; border-radius: 50%; background: #185fa5; display: inline-block; }

  /* Pills dos itens no calendário */
  .cal-item { border-radius: 4px; padding: 2px 5px; font-size: 10px; margin-bottom: 2px; cursor: pointer; display: flex; align-items: center; gap: 3px; line-height: 1.4; transition: opacity .15s; }
  .cal-item:hover { opacity: 0.8; }
  .cal-item.comprado { opacity: 0.45; text-decoration: line-through; }
  .cal-item.vencido   { background: #fce8e8; color: #8b1a1a; }
  .cal-item.urgente   { background: #fde8d4; color: #7a3500; }
  .cal-item.atencao   { background: #fef3d0; color: #6b4700; }
  .cal-item.ok        { background: #e4f3e9; color: #1a5c33; }
  .cal-item.imediato  { background: #f0eaff; color: #4a2a8a; }
  .cal-item.comprado-badge { background: #e6f0fb; color: #0c447c; }
  .cal-check { width: 10px; height: 10px; flex-shrink: 0; cursor: pointer; accent-color: #1e7e4e; }
  .cal-more { font-size: 10px; color: #888780; cursor: pointer; padding: 1px 4px; }
  .cal-more:hover { color: #2c2c2a; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 500; display: none; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; width: 90%; max-width: 560px; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; }
  .modal-header { padding: 18px 20px 14px; border-bottom: 1px solid #e0dfd8; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #888780; line-height: 1; }
  .modal-body { overflow-y: auto; padding: 16px 20px; }
  .modal-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f1efe8; }
  .modal-item:last-child { border-bottom: none; }
  .modal-item input[type=checkbox] { width: 16px; height: 16px; margin-top: 2px; accent-color: #1e7e4e; cursor: pointer; flex-shrink: 0; }
  .modal-item-info { flex: 1; }
  .modal-item-name { font-size: 13px; font-weight: 500; }
  .modal-item-name.comprado { text-decoration: line-through; color: #888780; }
  .modal-item-meta { font-size: 11px; color: #888780; margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
  .badge-sm { display: inline-block; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 600; }
  .badge-sm.vencido   { background: #fce8e8; color: #8b1a1a; }
  .badge-sm.urgente   { background: #fde8d4; color: #7a3500; }
  .badge-sm.atencao   { background: #fef3d0; color: #6b4700; }
  .badge-sm.ok        { background: #e4f3e9; color: #1a5c33; }
  .badge-sm.imediato  { background: #f0eaff; color: #4a2a8a; }
  .badge-sm.comprado  { background: #e6f0fb; color: #0c447c; }
  .dest-sm { display: inline-block; border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 500; }
  .dest-sm.japao { background: #fde8f0; color: #8b1a4a; }
  .dest-sm.cusco { background: #e6f0fb; color: #0c3a7a; }
  .dest-sm.pata  { background: #e4f3e9; color: #1a5c33; }

  /* Legenda */
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; font-size: 11px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  .loading-bar { background: #e6f0fb; border: 1px solid #b5d4f4; border-radius: 10px; padding: 16px; text-align: center; color: #185fa5; font-size: 13px; margin-bottom: 16px; }
  .error-bar { background: #fcebeb; border: 1px solid #f7c1c1; border-radius: 10px; padding: 14px 16px; color: #791f1f; font-size: 13px; margin-bottom: 16px; display: none; }

  @media (max-width: 768px) {
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .cal-day { min-height: 70px; }
    .cal-item { font-size: 9px; }
    .container { padding: 12px; }
  }
  @media (max-width: 480px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .month-title { font-size: 15px; min-width: 140px; }
  }
</style>
</head>
<body>

<header>
  <h1>📅 Calendário de Tickets & Reservas</h1>
  <div class="header-right">
    <span class="last-update" id="last-update">Carregando...</span>
    <button class="btn btn-dark" id="btn-refresh" onclick="loadData()">↻ Atualizar</button>
  </div>
</header>

<div class="container">
  <div class="loading-bar" id="loading-bar">⏳ Buscando dados da planilha...</div>
  <div class="error-bar" id="error-bar"></div>

  <div id="dashboard-content" style="display:none">
    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi urgent" ><div class="label">⚠️ Comprar agora</div><div class="value" id="kpi-urgente">0</div></div>
      <div class="kpi warning"><div class="label">🔔 Atenção</div><div class="value" id="kpi-atencao">0</div></div>
      <div class="kpi ok"    ><div class="label">✅ Em dia</div><div class="value" id="kpi-ok">0</div></div>
      <div class="kpi done"  ><div class="label">🛒 Comprados</div><div class="value" id="kpi-comprados">0</div></div>
      <div class="kpi total" ><div class="label">📋 Total</div><div class="value" id="kpi-total">0</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="nav-month">
        <button class="btn btn-outline" onclick="changeMonth(-1)">&#8592;</button>
        <span class="month-title" id="month-title"></span>
        <button class="btn btn-outline" onclick="changeMonth(1)">&#8594;</button>
        <button class="btn btn-outline" onclick="goToday()">Hoje</button>
      </div>
      <div class="filters-right">
        <select id="filter-destino" onchange="renderCalendar()">
          <option value="">Todos os destinos</option>
          <option value="Japão">Japão</option>
          <option value="Cusco & Machu Picchu">Cusco & Machu Picchu</option>
          <option value="Patagônia">Patagônia</option>
        </select>
        <div class="btn-group" id="filter-status">
          <button class="btn-filter active" onclick="setFilter('todos')">Todos</button>
          <button class="btn-filter" onclick="setFilter('urgente')">Urgente</button>
          <button class="btn-filter" onclick="setFilter('atencao')">Atenção</button>
          <button class="btn-filter" onclick="setFilter('ok')">Em dia</button>
        </div>
      </div>
    </div>

    <!-- Calendário -->
    <div class="calendar-wrap">
      <div class="cal-header">
        <div class="cal-dow">Dom</div>
        <div class="cal-dow">Seg</div>
        <div class="cal-dow">Ter</div>
        <div class="cal-dow">Qua</div>
        <div class="cal-dow">Qui</div>
        <div class="cal-dow">Sex</div>
        <div class="cal-dow">Sáb</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Legenda -->
    <div class="legend">
      <span style="color:#888780;font-weight:500">Legenda:</span>
      <div class="legend-item"><div class="legend-dot" style="background:#fce8e8;border:1px solid #f7c1c1"></div> Vencido</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fde8d4;border:1px solid #f5c4b3"></div> Urgente</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fef3d0;border:1px solid #fac775"></div> Atenção</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e4f3e9;border:1px solid #c0dd97"></div> Em dia</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f0eaff;border:1px solid #d4c8f8"></div> Comprar agora</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e6f0fb;border:1px solid #b5d4f4"></div> ✓ Comprado</div>
    </div>
  </div>
</div>

<!-- Modal dia -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxJBS-d9Kh-L_SP6YAHlaadvt-7FpArncij7n7tZ59m4jM5ZJbl5E2dH0zcq-o2WCol/exec';
const REFRESH_MS = 60 * 60 * 1000;

let items = [], filterStatus = 'todos';
let curYear, curMonth;
const today = new Date(); today.setHours(0,0,0,0);

// Inicia no mês atual
curYear = today.getFullYear();
curMonth = today.getMonth();

// ── Regras de antecedência ──────────────────────────────
function getDias(nome) {
  const n = nome.toLowerCase();
  if (n.includes('ticket machu picchu'))                                      return {dias:0,  tipo:'imediato'};
  if (n.includes('trem ida e volta aguas calientes'))                         return {dias:90, tipo:'prazo'};
  if (n.includes('trem bala') || n.includes('ticket trem bala'))             return {dias:60, tipo:'prazo'};
  if (n.includes('shinkansen'))                                               return {dias:60, tipo:'prazo'};
  if (n.includes('teamlab'))                                                  return {dias:60, tipo:'prazo'};
  if (n.includes('shibuya sky'))                                              return {dias:15, tipo:'prazo'};
  if (n.includes('universal'))                                                return {dias:60, tipo:'prazo'};
  if (n.includes('fastpass'))                                                 return {dias:60, tipo:'prazo'};
  if (n.includes('torres del paine'))                                         return {dias:15, tipo:'prazo'};
  if (n.includes('cerim'))                                                    return {dias:60, tipo:'prazo'};
  if (n.includes('navega'))                                                   return {dias:60, tipo:'prazo'};
  if (n.includes('mini trekking'))                                            return {dias:60, tipo:'prazo'};
  if (n.includes('ingresso') || n.includes('entrada parque'))                return {dias:15, tipo:'prazo'};
  if (n.includes('reserva hotel'))                                            return {dias:0,  tipo:'imediato'};
  if (n.includes('almo') || n.includes('jantar') || n.includes('box lunch')) return {dias:3,  tipo:'prazo'};
  return {dias:7, tipo:'prazo'};
}

function parseDate(s) {
  if (!s) return new Date('invalid');
  if (typeof s==='string' && s.includes('/')) { const [d,m,y]=s.trim().split('/'); return new Date(+y,+m-1,+d); }
  return new Date(s);
}
function getStatus(dr, tipo) {
  if (tipo==='imediato') return 'imediato';
  if (dr<0)   return 'vencido';
  if (dr<=7)  return 'urgente';
  if (dr<=20) return 'atencao';
  return 'ok';
}
function sLabel(s) { return {vencido:'Vencido',urgente:'Comprar já!',atencao:'Atenção',ok:'Em dia',imediato:'Comprar agora'}[s]||s; }
function destClass(d) { return d==='Japão'?'japao':d==='Patagônia'?'pata':'cusco'; }
function fmtDate(d) { return d.toLocaleDateString('pt-BR'); }

// ── Carregar dados ──────────────────────────────────────
async function loadData() {
  const btn=document.getElementById('btn-refresh');
  const lb=document.getElementById('loading-bar');
  const eb=document.getElementById('error-bar');
  const dc=document.getElementById('dashboard-content');
  btn.disabled=true; btn.textContent='↻ Atualizando...';
  lb.style.display='block'; eb.style.display='none';
  try {
    const r = await fetch(API_URL+'?t='+Date.now());
    if (!r.ok) throw new Error('HTTP '+r.status);
    processData(await r.json());
    lb.style.display='none'; dc.style.display='block';
    document.getElementById('last-update').textContent =
      'Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    lb.style.display='none'; eb.style.display='block';
    eb.innerHTML='⚠️ Não foi possível carregar os dados.<br><small>'+e.message+'</small>';
    if (items.length) dc.style.display='block';
  } finally { btn.disabled=false; btn.textContent='↻ Atualizar'; }
}

function processData(data) {
  items = data.map((row,i) => {
    const dateEvento = parseDate(String(row.date));
    if (isNaN(dateEvento)) return null;
    const nome = String(row.name||'');
    const {dias,tipo} = getDias(nome);
    const dataPrazo = new Date(dateEvento);
    if (dias>0) dataPrazo.setDate(dataPrazo.getDate()-dias);
    const dr = Math.ceil((dataPrazo-today)/864e5);
    return {
      idx:i, id:String(row.id), date:String(row.date),
      dateEvento, nome, destino:String(row.dest||''),
      dias, tipo, dataPrazo, diasRestantes:dr,
      status:getStatus(dr,tipo),
      comprado: row.comprado===true||row.comprado==='TRUE'
    };
  }).filter(Boolean);
  updateKPIs();
  renderCalendar();
}

function updateKPIs() {
  const pend = items.filter(i=>!i.comprado);
  const comp = items.filter(i=>i.comprado);
  document.getElementById('kpi-urgente').textContent  = pend.filter(i=>['vencido','urgente','imediato'].includes(i.status)).length;
  document.getElementById('kpi-atencao').textContent  = pend.filter(i=>i.status==='atencao').length;
  document.getElementById('kpi-ok').textContent       = pend.filter(i=>i.status==='ok').length;
  document.getElementById('kpi-comprados').textContent= comp.length;
  document.getElementById('kpi-total').textContent    = items.length;
}

// ── Calendário ──────────────────────────────────────────
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function changeMonth(dir) { curMonth+=dir; if(curMonth>11){curMonth=0;curYear++;} if(curMonth<0){curMonth=11;curYear--;} renderCalendar(); }
function goToday() { curYear=today.getFullYear(); curMonth=today.getMonth(); renderCalendar(); }

function getFiltered() {
  const dest = document.getElementById('filter-destino')?.value||'';
  return items.filter(i => {
    if (dest && i.destino!==dest) return false;
    if (filterStatus!=='todos' && !i.comprado && i.status!==filterStatus) return false;
    return true;
  });
}

function renderCalendar() {
  document.getElementById('month-title').textContent = MONTHS_PT[curMonth]+' '+curYear;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  const daysInPrev = new Date(curYear, curMonth, 0).getDate();

  const filtered = getFiltered();

  // Agrupa por data do evento
  const byDate = {};
  filtered.forEach(item => {
    const key = item.dateEvento.toDateString();
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push(item);
  });

  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  for (let c = 0; c < totalCells; c++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day';

    let dayNum, isCurrentMonth = true;
    if (c < firstDay) {
      dayNum = daysInPrev - firstDay + c + 1;
      isCurrentMonth = false;
      cell.classList.add('other-month');
    } else if (c >= firstDay + daysInMonth) {
      dayNum = c - firstDay - daysInMonth + 1;
      isCurrentMonth = false;
      cell.classList.add('other-month');
    } else {
      dayNum = c - firstDay + 1;
    }

    const cellDate = isCurrentMonth
      ? new Date(curYear, curMonth, dayNum)
      : c < firstDay
        ? new Date(curYear, curMonth-1, dayNum)
        : new Date(curYear, curMonth+1, dayNum);

    const isToday = cellDate.toDateString() === today.toDateString();
    if (isToday) cell.classList.add('today');

    // Número do dia
    const numDiv = document.createElement('div');
    numDiv.className = 'cal-day-num';
    numDiv.innerHTML = isToday ? `${dayNum}<span class="today-dot"></span>` : dayNum;
    cell.appendChild(numDiv);

    // Itens do dia
    const dayItems = byDate[cellDate.toDateString()] || [];
    dayItems.sort((a,b) => {
      const order = {vencido:0,urgente:1,imediato:2,atencao:3,ok:4};
      return (order[a.status]||5)-(order[b.status]||5);
    });

    const MAX_VISIBLE = 3;
    dayItems.slice(0, MAX_VISIBLE).forEach(item => {
      const pill = document.createElement('div');
      const cls = item.comprado ? 'comprado-badge' : item.status;
      pill.className = `cal-item ${cls} ${item.comprado?'comprado':''}`;
      pill.innerHTML = `
        <input type="checkbox" class="cal-check" ${item.comprado?'checked':''} onclick="event.stopPropagation();toggleItem(${item.idx},this)">
        <span>${item.nome.length>22?item.nome.slice(0,22)+'…':item.nome}</span>`;
      pill.onclick = () => openModal(cellDate, dayItems);
      cell.appendChild(pill);
    });

    if (dayItems.length > MAX_VISIBLE) {
      const more = document.createElement('div');
      more.className = 'cal-more';
      more.textContent = `+${dayItems.length - MAX_VISIBLE} mais`;
      more.onclick = () => openModal(cellDate, dayItems);
      cell.appendChild(more);
    }

    grid.appendChild(cell);
  }
}

// ── Modal ────────────────────────────────────────────────
function openModal(date, dayItems) {
  document.getElementById('modal-title').textContent =
    date.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  if (!dayItems.length) {
    body.innerHTML = '<p style="color:#888780;text-align:center;padding:20px">Nenhum item neste dia</p>';
  } else {
    dayItems.forEach(item => {
      const div = document.createElement('div');
      div.className = 'modal-item';
      const cls = item.comprado ? 'comprado' : item.status;
      const dLabel = item.tipo==='imediato' ? '—' : (item.diasRestantes<0 ? Math.abs(item.diasRestantes)+'d atraso' : item.diasRestantes+'d');
      div.innerHTML = `
        <input type="checkbox" ${item.comprado?'checked':''} onchange="toggleItem(${item.idx},this)">
        <div class="modal-item-info">
          <div class="modal-item-name ${item.comprado?'comprado':''}">${item.nome}</div>
          <div class="modal-item-meta">
            <span class="dest-sm ${destClass(item.destino)}">${item.destino}</span>
            <span class="badge-sm ${cls}">${item.comprado?'✓ Comprado':sLabel(item.status)}</span>
            ${item.tipo!=='imediato'?`<span>Prazo: ${fmtDate(item.dataPrazo)}</span>`:''}
            <span>${dLabel}</span>
            <span>ID: ${item.id}</span>
          </div>
        </div>`;
      body.appendChild(div);
    });
  }

  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(e) { if (e.target===document.getElementById('modal-bg')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-bg').classList.remove('open'); }

// ── Toggle comprado ──────────────────────────────────────
async function toggleItem(idx, el) {
  const checked = el.checked;
  items[idx].comprado = checked;
  updateKPIs();
  renderCalendar();
  // Re-abre modal se estiver aberto
  if (document.getElementById('modal-bg').classList.contains('open')) {
    const date = items[idx].dateEvento;
    const dayItems = items.filter(i => i.dateEvento.toDateString()===date.toDateString());
    openModal(date, dayItems);
  }

  try {
    const item = items[idx];
    const params = new URLSearchParams();
    params.append('id', item.id);
    params.append('name', item.nome);
    params.append('date', item.date);
    params.append('comprado', checked?'true':'false');
    await fetch(API_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: params.toString()
    });
  } catch(e) { console.error('Erro ao salvar:', e); }
}

function setFilter(val) {
  filterStatus = val;
  const labels = {todos:'Todos',urgente:'Urgente',atencao:'Atenção',ok:'Em dia'};
  document.querySelectorAll('#filter-status .btn-filter').forEach(b=>b.classList.toggle('active',b.textContent.trim()===labels[val]));
  renderCalendar();
}

loadData();
setInterval(loadData, REFRESH_MS);
</script>
